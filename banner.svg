<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Abstract AI Network on the Left -->
  <g transform="translate(60, 40)">
    <!-- Lines -->
    <path d="M40,85 L90,30 L160,50 L200,120 L130,160 L60,140 Z" fill="none" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M90,30 L130,160 M160,50 L60,140 M40,85 L200,120" fill="none" stroke="url(#textGrad)" stroke-width="1" stroke-opacity="0.3"/>
    
    <!-- Hexagons -->
    <g transform="translate(90,30)" filter="url(#glow)">
      <polygon points="0,-15 13,-7.5 13,7.5 0,15 -13,7.5 -13,-7.5" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#ffffff"/>
    </g>
    <g transform="translate(160,50)" filter="url(#glow)">
      <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-20" fill="none" stroke="#818cf8" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff"/>
    </g>
    <g transform="translate(200,120)" filter="url(#glow)">
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-12" fill="none" stroke="#c084fc" stroke-width="2"/>
      <circle cx="0" cy="0" r="2" fill="#ffffff"/>
    </g>
    <g transform="translate(130,160)" filter="url(#glow)">
      <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-18" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#ffffff"/>
    </g>
    <g transform="translate(60,140)" filter="url(#glow)">
      <polygon points="0,-15 13,-7.5 13,7.5 0,15 -13,7.5 -13,-7.5" fill="none" stroke="#818cf8" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#ffffff"/>
    </g>
    <g transform="translate(40,85)" filter="url(#glow)">
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-12" fill="none" stroke="#c084fc" stroke-width="2"/>
      <circle cx="0" cy="0" r="2" fill="#ffffff"/>
    </g>
    <g transform="translate(125,95)" filter="url(#glow)">
      <polygon points="0,-25 21,-12.5 21,12.5 0,25 -21,12.5 -21,-25" fill="none" stroke="url(#textGrad)" stroke-width="3"/>
      <circle cx="0" cy="0" r="5" fill="#ffffff"/>
    </g>
    
    <!-- Extra connection lines -->
    <line x1="125" y1="95" x2="90" y2="30" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <line x1="125" y1="95" x2="160" y2="50" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <line x1="125" y1="95" x2="200" y2="120" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <line x1="125" y1="95" x2="130" y2="160" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <line x1="125" y1="95" x2="60" y2="140" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <line x1="125" y1="95" x2="40" y2="85" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>

  </g>

  <!-- Right Side Content -->
  <g transform="translate(380, 100)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff" letter-spacing="1">
      Satyam
    </text>
    <text x="2" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="url(#textGrad)" letter-spacing="3">
      AI SOFTWARE ENGINEER
    </text>
    
    <g transform="translate(2, 75)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9ca3af">
      <g transform="translate(0, 0)">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" fill="#9ca3af"/>
        <text x="24" y="11">github.com/Satyam2006chh</text>
      </g>
      <g transform="translate(0, 25)">
        <path d="M1.5 3A1.5 1.5 0 000 4.5v7A1.5 1.5 0 001.5 13h13a1.5 1.5 0 001.5-1.5v-7A1.5 1.5 0 0014.5 3h-13zM1 4.5a.5.5 0 01.5-.5h13a.5.5 0 01.5.5v.428l-6.646 3.988a.5.5 0 01-.508 0L1 4.928V4.5zm0 1.572v5.428a.5.5 0 00.5.5h13a.5.5 0 00.5-.5V6.072l-6.42 3.852a1.5 1.5 0 01-1.56 0L1 6.072z" fill="#9ca3af"/>
        <text x="24" y="11">satyamwwe47@gmail.com</text>
      </g>
    </g>
  </g>
</svg>
